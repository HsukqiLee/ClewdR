name: Upstream Sync

permissions:
  contents: write

on:
  schedule:
    - cron: "0 4 * * *" # At 04:00, every day
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      # Step 1: run a standard checkout action
      - name: Checkout target repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Step 2: 配置 git 用户信息
      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Step 3: 设置 sparse-checkout 排除 .github 目录和 Dockerfile
      - name: Configure git to exclude .github directory and Dockerfile
        run: |
          git config core.sparseCheckout true
          echo "/*" > .git/info/sparse-checkout
          echo "!.github/" >> .git/info/sparse-checkout
          echo "!Dockerfile" >> .git/info/sparse-checkout
          echo "Configured sparse-checkout to exclude .github directory and Dockerfile"

      # Step 4: 添加上游仓库并同步（手动实现以确保排除指定文件）
      - name: Manual sync excluding .github and Dockerfile
        run: |
          # 添加上游仓库
          git remote add upstream https://github.com/Xerxes-2/clewdr.git
          
          # 获取上游更新
          git fetch upstream master
          
          # 应用 sparse-checkout 配置
          git read-tree -m -u HEAD
          
          # 合并上游更改（排除 .github 目录和 Dockerfile）
          git merge upstream/master --no-edit --allow-unrelated-histories
          
          # 检查是否有更改需要推送
          if ! git diff --quiet HEAD origin/master; then
            echo "Changes detected, pushing to origin..."
            git push origin master
            echo "Successfully synced from upstream (excluding .github directory and Dockerfile)"
          else
            echo "No changes to sync"
          fi

      # Step 5: 清理
      - name: Cleanup
        if: always()
        run: |
          git remote remove upstream || true
          git config --unset core.sparseCheckout || true

      - name: Sync check
        if: failure()
        run: |
          echo "[Error] Failed to sync from upstream repository. Please check the logs above for details."
          exit 1
